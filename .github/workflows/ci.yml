name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# Coolify se stará o deploy přes vlastní webhook na GitHub.
# Tento workflow jen ověří, že kód buildí a běží.

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Smoke test — server start + health check
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          SESSION_SECRET: ci-test-secret-32-chars-minimum-xx
          RESEND_API_KEY: re_ci_dummy_key
          NODE_ENV: test
          LOG_LEVEL: warn
        run: |
          node src/server.js &
          SERVER_PID=$!
          # Počkej, než server nastartuje a provede migrace (max 20s)
          for i in $(seq 1 20); do
            sleep 1
            curl -sf http://localhost:3000/health && break
            echo "Attempt $i..."
          done
          curl -f http://localhost:3000/health || (kill $SERVER_PID; exit 1)
          kill $SERVER_PID

      - name: Docker build (ověření Dockerfile)
        run: docker build -t one-seil-space:ci .

      - name: Docker image size
        run: docker images one-seil-space:ci
